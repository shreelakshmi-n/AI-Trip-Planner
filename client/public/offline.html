<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AI Trip Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .button {
            background: white;
            color: #667eea;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .offline-features {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .offline-features h3 {
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .offline-features ul {
            list-style: none;
            text-align: left;
        }

        .offline-features li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .offline-features li:last-child {
            border-bottom: none;
        }

        .offline-features li::before {
            content: "✓ ";
            color: #4ade80;
            font-weight: bold;
            margin-right: 10px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .icon {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✈️</div>
        <h1>You're Offline</h1>
        <p>
            <span class="status-dot"></span>
            No internet connection detected. Some features require connectivity, but you can still access your saved trips!
        </p>
        <a href="/" class="button" id="retry-button">Try Again</a>

        <div class="offline-features">
            <h3>Available Offline:</h3>
            <ul>
                <li>View saved trips</li>
                <li>Browse trip history</li>
                <li>Access cached maps</li>
                <li>View profile information</li>
            </ul>
        </div>
    </div>

    <script>
        // Retry button functionality
        document.getElementById('retry-button').addEventListener('click', (e) => {
            if (!navigator.onLine) {
                e.preventDefault();
                alert('Still offline. Please check your internet connection.');
            }
        });

        // Automatic retry when online
        window.addEventListener('online', () => {
            window.location.href = '/';
        });

        // Check connection status
        if (navigator.onLine) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
